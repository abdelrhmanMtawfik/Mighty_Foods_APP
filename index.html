<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mighty Foods</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b12;
  --surface: #10141f;
  --surface2: #171d2e;
  --border: #1e2840;
  --accent: #3d7fff;
  --accent2: #5b5ef4;
  --green: #0fba73;
  --yellow: #f5a623;
  --red: #f04040;
  --text: #eaf0ff;
  --sub: #5e6e8a;
  --gold: #f7c948;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; }
body {
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* ── LOADER ─────────────────────────────── */
#loader {
  position:fixed; inset:0; z-index:999;
  background:var(--bg);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:18px; transition:opacity .4s ease;
}
#loader.out { opacity:0; pointer-events:none; }
.loader-logo {
  width:76px; height:76px; border-radius:22px;
  background:linear-gradient(135deg,#3d7fff,#5b5ef4);
  display:flex; align-items:center; justify-content:center;
  font-size:32px;
  box-shadow:0 0 50px rgba(61,127,255,.45);
  animation:logopulse 1.8s ease-in-out infinite;
}
@keyframes logopulse {
  0%,100%{box-shadow:0 0 30px rgba(61,127,255,.4)}
  50%{box-shadow:0 0 70px rgba(61,127,255,.75)}
}
.loader-title { font-size:22px; font-weight:900; letter-spacing:-.5px; }
.loader-sub { font-size:12px; color:var(--sub); }
.loader-bar {
  width:100px; height:2px;
  background:var(--border); border-radius:2px; overflow:hidden;
}
.loader-fill {
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  animation:fillbar 1.4s ease forwards;
}
@keyframes fillbar { to { width:100%; } }

/* ── TOP BAR ──────────────────────────── */
.topbar {
  position:sticky; top:0; z-index:50;
  background:rgba(8,11,18,.88); backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
  display:flex; align-items:center; gap:10px;
}
.topbar-icon {
  width:34px; height:34px; border-radius:10px; flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex; align-items:center; justify-content:center; font-size:16px;
}
.topbar-info { flex:1; min-width:0; }
.topbar-name {
  font-size:14px; font-weight:800;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.topbar-type { font-size:11px; color:var(--sub); }
.topbar-badge {
  font-size:10px; font-weight:700; padding:3px 9px;
  border-radius:20px; flex-shrink:0;
}
.badge-cust { background:rgba(15,186,115,.12); color:var(--green); border:1px solid rgba(15,186,115,.25); }
.badge-rep { background:rgba(61,127,255,.12); color:var(--accent); border:1px solid rgba(61,127,255,.25); }

/* ── RING HERO ────────────────────────── */
.ring-section {
  padding:20px 16px 12px;
  display:flex; align-items:center; gap:18px;
  background:linear-gradient(180deg,rgba(61,127,255,.06) 0%, transparent 100%);
  border-bottom:1px solid var(--border);
}
.ring-wrap { position:relative; display:inline-flex; flex-shrink:0; }
.ring-svg { transform:rotate(-90deg); }
.ring-track { fill:none; stroke:var(--border); stroke-width:9; }
.ring-fill { fill:none; stroke-width:9; stroke-linecap:round; transition:stroke-dashoffset 1.3s cubic-bezier(.4,0,.2,1); }
.ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.ring-pct { font-size:26px; font-weight:900; line-height:1; }
.ring-lbl { font-size:9px; color:var(--sub); margin-top:1px; }
.ring-stats { flex:1; display:flex; flex-direction:column; gap:9px; }
.rstat { }
.rstat-row { display:flex; justify-content:space-between; margin-bottom:5px; }
.rstat-label { font-size:11px; color:var(--sub); }
.rstat-val { font-size:11px; font-weight:700; }
.rstat-bar { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
.rstat-fill { height:100%; border-radius:3px; transition:width 1.2s cubic-bezier(.4,0,.2,1); }

/* ── NUMBERS GRID ────────────────────── */
.nums-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:8px; padding:14px 16px 10px;
}
.num-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:13px 12px;
}
.num-card-lbl { font-size:10px; color:var(--sub); }
.num-card-val { font-size:19px; font-weight:900; margin-top:3px; line-height:1; }
.num-card-sub { font-size:9px; color:var(--sub); margin-top:3px; }

/* ── TABS ────────────────────────────── */
.tabs-wrap {
  display:flex; gap:6px; padding:6px 16px 10px;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.tabs-wrap::-webkit-scrollbar { display:none; }
.tab {
  flex-shrink:0; font-size:12px; font-weight:700;
  padding:7px 14px; border-radius:20px;
  background:var(--surface); border:1px solid var(--border);
  cursor:pointer; transition:all .2s; color:var(--sub);
}
.tab.active {
  background:rgba(61,127,255,.12);
  border-color:var(--accent); color:var(--accent);
}
.tab:active { transform:scale(.95); }

/* ── TAB PANELS ──────────────────────── */
.panel { display:none; padding:0 16px 90px; }
.panel.active { display:block; }

/* Offer cards */
.offer-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:14px; margin-bottom:8px;
  position:relative; overflow:hidden;
}
.offer-live {
  position:absolute; top:12px; left:12px;
  font-size:9px; font-weight:800; padding:3px 8px;
  border-radius:20px;
  background:rgba(247,201,72,.12); color:var(--gold);
  border:1px solid rgba(247,201,72,.3);
}
.offer-name { font-size:14px; font-weight:800; margin:20px 0 10px 0; }
.offer-chips { display:flex; gap:6px; flex-wrap:wrap; }
.chip {
  font-size:10px; padding:4px 9px; border-radius:20px;
  background:var(--surface2); border:1px solid var(--border);
}
.chip-red { background:rgba(240,64,64,.08); border-color:rgba(240,64,64,.2); color:#f87171; }
.chip-blue { background:rgba(61,127,255,.08); border-color:rgba(61,127,255,.2); color:#7eb4ff; }

/* History */
.hist-section-title {
  font-size:10px; font-weight:800; letter-spacing:1.5px;
  color:var(--sub); text-transform:uppercase;
  padding:14px 0 8px;
}
.hist-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:12px 14px; margin-bottom:7px;
  display:flex; align-items:center; gap:10px;
}
.hist-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.hist-dot.hot { background:var(--green); box-shadow:0 0 8px rgba(15,186,115,.5); }
.hist-dot.warn { background:var(--yellow); box-shadow:0 0 8px rgba(245,166,35,.5); }
.hist-name { font-size:13px; font-weight:700; }
.hist-meta { font-size:10px; color:var(--sub); margin-top:3px; }

/* Notes */
.note-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:14px; margin-bottom:8px;
}
.note-top { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
.note-idx {
  width:22px; height:22px; border-radius:7px; flex-shrink:0;
  background:rgba(91,94,244,.18); color:var(--accent2);
  font-size:11px; font-weight:800;
  display:flex; align-items:center; justify-content:center;
}
.note-meta { font-size:10px; color:var(--sub); }
.note-text { font-size:13px; line-height:1.8; }

/* Customers list (rep view) */
.cust-row {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:12px 14px; margin-bottom:7px;
}
.cust-row-name { font-size:13px; font-weight:700; }
.cust-row-pct { font-size:11px; margin-top:5px; }
.cust-prog { height:4px; background:var(--border); border-radius:2px; overflow:hidden; margin-top:6px; }
.cust-fill { height:100%; border-radius:2px; transition:width 1.2s cubic-bezier(.4,0,.2,1); }

/* Empty */
.empty { text-align:center; padding:50px 20px; color:var(--sub); }
.empty-ico { font-size:44px; margin-bottom:12px; }
.empty-txt { font-size:13px; }

/* Scroll padding */
.pb { height:80px; }

/* Color helpers */
.c-g { color:var(--green); }
.c-y { color:var(--yellow); }
.c-r { color:var(--red); }
.c-a { color:var(--accent); }

/* Anim on load */
.fade-up { opacity:0; transform:translateY(16px); animation:fadeup .4s ease forwards; }
@keyframes fadeup { to { opacity:1; transform:translateY(0); } }
.d1{animation-delay:.05s} .d2{animation-delay:.1s}
.d3{animation-delay:.15s} .d4{animation-delay:.2s}
.d5{animation-delay:.25s}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-logo">🍽️</div>
  <div class="loader-title">Mighty Foods</div>
  <div class="loader-sub">جاري تحميل البيانات...</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-icon" id="tbIcon">🏢</div>
  <div class="topbar-info">
    <div class="topbar-name" id="tbName">–</div>
    <div class="topbar-type" id="tbType">–</div>
  </div>
  <div class="topbar-badge" id="tbBadge">–</div>
</div>

<!-- RING HERO -->
<div class="ring-section fade-up d1">
  <div class="ring-wrap">
    <svg class="ring-svg" width="120" height="120" viewBox="0 0 120 120">
      <circle class="ring-track" cx="60" cy="60" r="52"/>
      <circle class="ring-fill" id="ringEl" cx="60" cy="60" r="52"
        stroke-dasharray="327" stroke-dashoffset="327"/>
    </svg>
    <div class="ring-center">
      <div class="ring-pct" id="ringPct">0%</div>
      <div class="ring-lbl">إنجاز</div>
    </div>
  </div>
  <div class="ring-stats">
    <div class="rstat">
      <div class="rstat-row">
        <span class="rstat-label">التارجت الشهري</span>
        <span class="rstat-val c-a" id="rsMonthly">–</span>
      </div>
      <div class="rstat-bar"><div class="rstat-fill" id="rsBarMonthly" style="width:0%"></div></div>
    </div>
    <div class="rstat">
      <div class="rstat-row">
        <span class="rstat-label">تارجت الفترة</span>
        <span class="rstat-val c-y" id="rsTimegone">–</span>
      </div>
      <div class="rstat-bar"><div class="rstat-fill" id="rsBarTime" style="width:0%"></div></div>
    </div>
    <div class="rstat">
      <div class="rstat-row">
        <span class="rstat-label">المحقق (MTD)</span>
        <span class="rstat-val" id="rsMTD">–</span>
      </div>
    </div>
  </div>
</div>

<!-- NUMBERS -->
<div class="nums-grid fade-up d2">
  <div class="num-card">
    <div class="num-card-lbl">📈 إنجاز الشهر</div>
    <div class="num-card-val" id="ncMonthPct">–</div>
  </div>
  <div class="num-card">
    <div class="num-card-lbl">🚀 إنجاز الفترة</div>
    <div class="num-card-val" id="ncTimePct">–</div>
  </div>
  <div class="num-card">
    <div class="num-card-lbl">🔥 الأصناف المتوقفة</div>
    <div class="num-card-val c-y" id="ncStopped">–</div>
  </div>
  <div class="num-card">
    <div class="num-card-lbl">🎁 عروض شغالة</div>
    <div class="num-card-val c-g" id="ncOffers">–</div>
  </div>
</div>

<!-- TABS -->
<div class="tabs-wrap fade-up d3">
  <div class="tab active" onclick="openTab('perf',this)">📊 الأداء</div>
  <div class="tab" onclick="openTab('offers',this)">🎁 العروض</div>
  <div class="tab" onclick="openTab('history',this)">📦 الأصناف</div>
  <div class="tab" onclick="openTab('notes',this)">📝 الملاحظات</div>
</div>

<!-- PANEL: PERF -->
<div class="panel active fade-up d4" id="panel-perf">
  <div id="perfContent"></div>
</div>

<!-- PANEL: OFFERS -->
<div class="panel" id="panel-offers">
  <div id="offersContent"></div>
</div>

<!-- PANEL: HISTORY -->
<div class="panel" id="panel-history">
  <div id="histContent"></div>
</div>

<!-- PANEL: NOTES -->
<div class="panel" id="panel-notes">
  <div id="notesContent"></div>
</div>

<script>
// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
const fmt = n => Number(n||0).toLocaleString('en-US',{maximumFractionDigits:0});
const pct = (a,b) => b > 0 ? Math.round((a/b)*100) : 0;

function pctColor(p) {
  if (p >= 90) return 'var(--green)';
  if (p >= 70) return 'var(--yellow)';
  return 'var(--red)';
}
function pctClass(p) {
  if (p >= 90) return 'c-g';
  if (p >= 70) return 'c-y';
  return 'c-r';
}

// ─────────────────────────────────────────────
// LOAD DATA FROM URL HASH  (#base64json)
// n8n will build:  index.html#BASE64_JSON
// ─────────────────────────────────────────────
function loadData() {
  let data = null;

  // 1. Try URL hash
  const hash = location.hash.slice(1);
  if (hash) {
    try {
      // Buffer.from().toString('base64') in n8n = UTF-8 bytes encoded as base64
      // Decode: base64 -> Uint8Array -> TextDecoder('utf-8') -> JSON
      const bytes = Uint8Array.from(atob(hash), c => c.charCodeAt(0));
      data = JSON.parse(new TextDecoder('utf-8').decode(bytes));
    } catch(e){}
  }

  // 2. Try URL param ?d=
  if (!data) {
    const param = new URLSearchParams(location.search).get('d');
    if (param) {
      try {
        const bytes = Uint8Array.from(atob(param), c => c.charCodeAt(0));
        data = JSON.parse(new TextDecoder('utf-8').decode(bytes));
      } catch(e){}
    }
  }

  // 3. Demo/fallback data if nothing passed
  if (!data) data = getDemoData();

  return data;
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render(d) {
  const isRep = d.type === 'rep';
  const monthlyPct = pct(d.mtd, d.monthly);
  const timePct    = pct(d.mtd, d.timeGone);

  // Top bar
  document.getElementById('tbIcon').textContent = isRep ? '👤' : '🏢';
  document.getElementById('tbName').textContent = d.name;
  document.getElementById('tbType').textContent = (isRep ? 'مندوب' : 'عميل') + ' — ' + (d.channel||'');
  const badge = document.getElementById('tbBadge');
  badge.textContent = isRep ? 'مندوب' : 'عميل';
  badge.className = 'topbar-badge ' + (isRep ? 'badge-rep' : 'badge-cust');

  // Ring
  const circumference = 2 * Math.PI * 52; // ≈ 327
  const offset = circumference - (Math.min(monthlyPct,100) / 100) * circumference;
  const ringEl = document.getElementById('ringEl');
  ringEl.style.stroke = pctColor(monthlyPct);
  ringEl.style.filter = `drop-shadow(0 0 5px ${pctColor(monthlyPct)}80)`;
  setTimeout(() => { ringEl.style.strokeDashoffset = offset; }, 200);

  const rpEl = document.getElementById('ringPct');
  rpEl.textContent = monthlyPct + '%';
  rpEl.className = 'ring-pct ' + pctClass(monthlyPct);

  // Ring stats
  document.getElementById('rsMonthly').textContent = fmt(d.monthly);
  document.getElementById('rsTimegone').textContent = fmt(d.timeGone);
  document.getElementById('rsMTD').className = 'rstat-val ' + pctClass(monthlyPct);
  document.getElementById('rsMTD').textContent = fmt(d.mtd);

  const barM = document.getElementById('rsBarMonthly');
  barM.style.background = pctColor(monthlyPct);
  setTimeout(() => { barM.style.width = Math.min(monthlyPct,100) + '%'; }, 250);

  const barT = document.getElementById('rsBarTime');
  barT.style.background = pctColor(timePct);
  setTimeout(() => { barT.style.width = Math.min(timePct,100) + '%'; }, 300);

  // Numbers grid
  const mpEl = document.getElementById('ncMonthPct');
  mpEl.textContent = monthlyPct + '%';
  mpEl.className = 'num-card-val ' + pctClass(monthlyPct);

  const tpEl = document.getElementById('ncTimePct');
  tpEl.textContent = timePct + '%';
  tpEl.className = 'num-card-val ' + pctClass(timePct);

  const stopped = (d.history||[]).filter(h=>h.type==='stopped').length;
  document.getElementById('ncStopped').textContent = stopped;
  document.getElementById('ncOffers').textContent = (d.offers||[]).length;

  // Panels
  renderPerf(d, isRep, monthlyPct, timePct);
  renderOffers(d.offers || []);
  renderHistory(d.history || []);
  renderNotes(d.notes || []);
}

// ── PERF PANEL ──
function renderPerf(d, isRep, monthlyPct, timePct) {
  let html = '';

  if (isRep && d.customers && d.customers.length) {
    // Rep: show per-customer breakdown
    html += `<div class="hist-section-title">تفاصيل العملاء</div>`;
    d.customers.forEach(c => {
      const cp = pct(c.mtd, c.target);
      html += `
      <div class="cust-row">
        <div class="cust-row-name">${c.name}</div>
        <div class="cust-row-pct ${pctClass(cp)}">
          هدف: ${fmt(c.target)} &nbsp;|&nbsp; محقق: ${fmt(c.mtd)} &nbsp;|&nbsp; <strong>${cp}%</strong>
        </div>
        <div class="cust-prog">
          <div class="cust-fill" style="width:${Math.min(cp,100)}%;background:${pctColor(cp)}"></div>
        </div>
      </div>`;
    });
  } else {
    // Customer: detailed numbers
    const rows = [
      ['🎯 التارجت الشهري', fmt(d.monthly), 'c-a'],
      ['⏳ تارجت الفترة', fmt(d.timeGone), 'c-y'],
      ['💰 المحقق (MTD)', fmt(d.mtd), pctClass(monthlyPct)],
      ['📈 إنجاز الشهر', monthlyPct + '%', pctClass(monthlyPct)],
      ['🚀 إنجاز الفترة', timePct + '%', pctClass(timePct)],
    ];
    html += `<div class="hist-section-title" style="padding-top:14px">ملخص الأداء</div>`;
    rows.forEach(([lbl,val,cls]) => {
      html += `
      <div class="cust-row" style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:13px;color:var(--sub)">${lbl}</span>
        <span style="font-size:15px;font-weight:800" class="${cls}">${val}</span>
      </div>`;
    });
  }

  document.getElementById('perfContent').innerHTML = html;
}

// ── OFFERS PANEL ──
function renderOffers(offers) {
  if (!offers.length) {
    document.getElementById('offersContent').innerHTML =
      `<div class="empty"><div class="empty-ico">📭</div><div class="empty-txt">لا توجد عروض شغالة حالياً</div></div>`;
    return;
  }
  let html = '';
  offers.forEach(o => {
    html += `
    <div class="offer-card">
      <div class="offer-live">🔥 ساري</div>
      <div class="offer-name">${o.name}</div>
      <div class="offer-chips">
        <span class="chip">${o.barcode}</span>
        <span class="chip chip-red">خصم ${o.discount}</span>
        <span class="chip">قبل: ${fmt(o.before)}</span>
        <span class="chip">بعد: ${fmt(o.after)}</span>
        <span class="chip chip-blue">⏳ حتى ${o.until}</span>
      </div>
    </div>`;
  });
  document.getElementById('offersContent').innerHTML = html;
}

// ── HISTORY PANEL ──
function renderHistory(history) {
  const top     = history.filter(h => h.type === 'top');
  const stopped = history.filter(h => h.type === 'stopped');
  let html = '';

  if (top.length) {
    html += `<div class="hist-section-title">🔥 أصناف أساسية</div>`;
    top.forEach(h => {
      html += `
      <div class="hist-card">
        <div class="hist-dot hot"></div>
        <div style="flex:1">
          <div class="hist-name">${h.name}</div>
          <div class="hist-meta">آخر كمية: ${h.qty} | متوسط: ${h.avg} | منذ ${h.days} يوم</div>
        </div>
      </div>`;
    });
  }
  if (stopped.length) {
    html += `<div class="hist-section-title">⚠️ أصناف غائبة — فرص بيع</div>`;
    stopped.forEach(h => {
      html += `
      <div class="hist-card">
        <div class="hist-dot warn"></div>
        <div style="flex:1">
          <div class="hist-name">${h.name}</div>
          <div class="hist-meta">متوقف منذ ${h.days} يوم | كانت كميته: ${h.qty}</div>
        </div>
      </div>`;
    });
  }
  if (!html) html = `<div class="empty"><div class="empty-ico">📦</div><div class="empty-txt">لا توجد بيانات تاريخية</div></div>`;
  document.getElementById('histContent').innerHTML = html;
}

// ── NOTES PANEL ──
function renderNotes(notes) {
  if (!notes.length) {
    document.getElementById('notesContent').innerHTML =
      `<div class="empty"><div class="empty-ico">📝</div><div class="empty-txt">لا توجد ملاحظات مسجلة</div></div>`;
    return;
  }
  let html = '';
  notes.forEach((n, i) => {
    html += `
    <div class="note-card">
      <div class="note-top">
        <div class="note-idx">${i+1}</div>
        <div class="note-meta">${n.date} — ${n.by}</div>
      </div>
      <div class="note-text">${n.text}</div>
    </div>`;
  });
  document.getElementById('notesContent').innerHTML = html;
}

function openTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
}
